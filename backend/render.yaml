services:
  - type: web
    name: software-architect-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: DATABASE_URL
        sync: false
